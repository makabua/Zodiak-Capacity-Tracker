<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Carrier Management</title>
<style>
  /* ---------- Theme ---------- */
  :root {
    --bg: #0f1419;
    --bg-elev: #171c23;
    --bg-elev-2: #1f2630;
    --border: #2a323d;
    --border-strong: #3a4653;
    --fg: #e5e9ef;
    --fg-dim: #9aa5b4;
    --fg-faint: #6b7683;
    --accent: #4f8bf0;
    --accent-hover: #6ba0ff;
    --green: #22c55e;
    --yellow: #eab308;
    --red: #ef4444;
    --green-bg: rgba(34, 197, 94, 0.15);
    --yellow-bg: rgba(234, 179, 8, 0.15);
    --red-bg: rgba(239, 68, 68, 0.15);
    --shadow: 0 8px 24px rgba(0, 0, 0, 0.35);
  }
  @media (prefers-color-scheme: light) {
    :root {
      --bg: #f5f7fa;
      --bg-elev: #ffffff;
      --bg-elev-2: #f0f3f8;
      --border: #dfe4ec;
      --border-strong: #c1c9d4;
      --fg: #1a202c;
      --fg-dim: #4a5568;
      --fg-faint: #718096;
      --accent: #3b7be0;
      --accent-hover: #2563c7;
      --shadow: 0 4px 16px rgba(20, 30, 50, 0.08);
    }
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
    background: var(--bg);
    color: var(--fg);
    font-size: 14px;
    line-height: 1.5;
  }

  a { color: var(--accent); text-decoration: none; }
  a:hover { color: var(--accent-hover); text-decoration: underline; }

  /* ---------- Layout ---------- */
  header.topbar {
    position: sticky; top: 0; z-index: 10;
    background: var(--bg-elev);
    border-bottom: 1px solid var(--border);
    padding: 12px 20px;
    display: flex; align-items: center; gap: 16px;
  }
  header.topbar h1 {
    margin: 0; font-size: 16px; font-weight: 600; letter-spacing: 0.3px;
    cursor: pointer;
  }
  header.topbar h1 .logo-mark {
    display: inline-block; width: 8px; height: 8px; border-radius: 2px;
    background: var(--accent); margin-right: 8px; vertical-align: 2px;
  }
  header.topbar .spacer { flex: 1; }

  main { padding: 20px; max-width: 1400px; margin: 0 auto; }

  /* ---------- Buttons ---------- */
  .btn {
    display: inline-flex; align-items: center; gap: 6px;
    background: var(--bg-elev-2);
    color: var(--fg);
    border: 1px solid var(--border);
    padding: 7px 12px;
    border-radius: 6px;
    font-size: 13px;
    font-family: inherit;
    cursor: pointer;
    transition: background .12s, border-color .12s;
    white-space: nowrap;
  }
  .btn:hover { background: var(--border); border-color: var(--border-strong); }
  .btn.primary { background: var(--accent); color: white; border-color: var(--accent); }
  .btn.primary:hover { background: var(--accent-hover); border-color: var(--accent-hover); }
  .btn.danger { color: var(--red); }
  .btn.danger:hover { background: var(--red-bg); border-color: var(--red); }
  .btn.ghost { background: transparent; }
  .btn.sm { padding: 4px 8px; font-size: 12px; }

  /* ---------- Inputs ---------- */
  input, select, textarea {
    font-family: inherit; font-size: 13px;
    background: var(--bg-elev-2);
    color: var(--fg);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 7px 10px;
    outline: none;
    width: 100%;
  }
  input:focus, select:focus, textarea:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(79, 139, 240, 0.2);
  }
  textarea { resize: vertical; min-height: 70px; }
  label {
    display: block;
    font-size: 12px;
    color: var(--fg-dim);
    margin-bottom: 4px;
    font-weight: 500;
  }
  .field { margin-bottom: 12px; }
  .field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  @media (max-width: 600px) { .field-row { grid-template-columns: 1fr; } }

  /* ---------- Carrier list ---------- */
  .toolbar {
    display: flex; gap: 10px; margin-bottom: 16px; flex-wrap: wrap;
    align-items: center;
  }
  .toolbar .search { flex: 1 1 280px; min-width: 220px; }
  .toolbar select { width: auto; min-width: 120px; }

  table.carriers {
    width: 100%;
    border-collapse: collapse;
    background: var(--bg-elev);
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
  }
  table.carriers th, table.carriers td {
    padding: 10px 14px;
    text-align: left;
    border-bottom: 1px solid var(--border);
    font-size: 13px;
  }
  table.carriers thead th {
    background: var(--bg-elev-2);
    color: var(--fg-dim);
    font-weight: 600;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  table.carriers tbody tr { cursor: pointer; transition: background .08s; }
  table.carriers tbody tr:hover { background: var(--bg-elev-2); }
  table.carriers tbody tr:last-child td { border-bottom: none; }

  .empty-state {
    padding: 48px 20px;
    text-align: center;
    color: var(--fg-dim);
    background: var(--bg-elev);
    border: 1px dashed var(--border);
    border-radius: 8px;
  }

  /* ---------- Badges ---------- */
  .badge {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 12px;
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    border: 1px solid transparent;
  }
  .badge.status-Active   { background: var(--green-bg);  color: var(--green);  border-color: var(--green); }
  .badge.status-Watch    { background: var(--yellow-bg); color: var(--yellow); border-color: var(--yellow); }
  .badge.status-Blocked  { background: var(--red-bg);    color: var(--red);    border-color: var(--red); }
  .badge.outcome-Completed { background: var(--green-bg);  color: var(--green);  border-color: var(--green); }
  .badge.outcome-TONU      { background: var(--red-bg);    color: var(--red);    border-color: var(--red); }
  .badge.outcome-Issue     { background: var(--yellow-bg); color: var(--yellow); border-color: var(--yellow); }
  .badge.role {
    background: var(--bg-elev-2);
    color: var(--fg-dim);
    border-color: var(--border-strong);
    text-transform: none;
    letter-spacing: 0;
    font-weight: 500;
  }

  /* ---------- Detail view ---------- */
  .back-link { color: var(--fg-dim); font-size: 12px; margin-bottom: 8px; display: inline-block; cursor: pointer; }
  .back-link:hover { color: var(--fg); }

  .detail-header {
    display: flex; justify-content: space-between; align-items: flex-start;
    gap: 16px; margin-bottom: 24px; flex-wrap: wrap;
  }
  .detail-header h2 { margin: 0 0 6px 0; font-size: 22px; }
  .detail-header .meta { color: var(--fg-dim); font-size: 13px; }
  .detail-header .actions { display: flex; gap: 8px; flex-wrap: wrap; }

  .card {
    background: var(--bg-elev);
    border: 1px solid var(--border);
    border-radius: 8px;
    margin-bottom: 16px;
    overflow: hidden;
  }
  .card-header {
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
    display: flex; justify-content: space-between; align-items: center;
    background: var(--bg-elev-2);
  }
  .card-header h3 { margin: 0; font-size: 13px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; color: var(--fg-dim); }
  .card-body { padding: 16px; }

  .kv-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 16px 24px;
  }
  .kv-grid .kv-label { font-size: 11px; color: var(--fg-faint); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 2px; }
  .kv-grid .kv-value { font-size: 14px; color: var(--fg); }

  .item-list { display: flex; flex-direction: column; gap: 8px; }
  .item {
    padding: 10px 12px;
    background: var(--bg-elev-2);
    border: 1px solid var(--border);
    border-radius: 6px;
    display: flex; justify-content: space-between; align-items: center;
    gap: 10px;
  }
  .item .item-main { flex: 1; min-width: 0; }
  .item .item-main .title { font-weight: 500; }
  .item .item-main .sub { font-size: 12px; color: var(--fg-dim); margin-top: 2px; }
  .item .item-actions { display: flex; gap: 6px; opacity: 0.6; transition: opacity .1s; }
  .item:hover .item-actions { opacity: 1; }

  table.loads { width: 100%; border-collapse: collapse; }
  table.loads th, table.loads td { padding: 8px 12px; text-align: left; border-bottom: 1px solid var(--border); font-size: 13px; }
  table.loads thead th { color: var(--fg-dim); font-weight: 600; font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; background: var(--bg-elev-2); }
  table.loads tbody tr:last-child td { border-bottom: none; }

  .note {
    padding: 10px 12px;
    background: var(--bg-elev-2);
    border-left: 3px solid var(--accent);
    border-radius: 4px;
    margin-bottom: 8px;
    position: relative;
  }
  .note .note-meta { font-size: 11px; color: var(--fg-faint); margin-bottom: 4px; }
  .note .note-body { white-space: pre-wrap; word-wrap: break-word; }
  .note .note-del { position: absolute; top: 8px; right: 8px; opacity: 0.5; }
  .note:hover .note-del { opacity: 1; }

  /* ---------- Modal ---------- */
  .modal-backdrop {
    position: fixed; inset: 0; background: rgba(0, 0, 0, 0.6);
    z-index: 100; display: flex; align-items: center; justify-content: center;
    padding: 20px;
  }
  .modal {
    background: var(--bg-elev);
    border: 1px solid var(--border);
    border-radius: 10px;
    box-shadow: var(--shadow);
    max-width: 560px; width: 100%;
    max-height: 90vh;
    display: flex; flex-direction: column;
  }
  .modal-header {
    padding: 14px 20px;
    border-bottom: 1px solid var(--border);
    display: flex; justify-content: space-between; align-items: center;
  }
  .modal-header h3 { margin: 0; font-size: 16px; }
  .modal-header .close {
    background: none; border: none; color: var(--fg-dim); cursor: pointer;
    font-size: 20px; padding: 0; line-height: 1;
  }
  .modal-body { padding: 20px; overflow-y: auto; }
  .modal-footer {
    padding: 12px 20px;
    border-top: 1px solid var(--border);
    display: flex; justify-content: flex-end; gap: 8px;
  }

  /* ---------- Toast ---------- */
  .toast {
    position: fixed; bottom: 20px; right: 20px; z-index: 200;
    background: var(--bg-elev);
    border: 1px solid var(--border);
    border-left: 3px solid var(--accent);
    padding: 10px 16px;
    border-radius: 6px;
    box-shadow: var(--shadow);
    max-width: 320px;
    animation: slideIn 0.15s ease-out;
  }
  .toast.error { border-left-color: var(--red); }
  @keyframes slideIn { from { transform: translateY(10px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

  .loading { color: var(--fg-dim); padding: 24px; text-align: center; }
  .muted { color: var(--fg-faint); font-style: italic; }
  .row-counts { color: var(--fg-dim); font-size: 12px; }

  /* mobile */
  @media (max-width: 700px) {
    main { padding: 12px; }
    table.carriers th:nth-child(3), table.carriers td:nth-child(3),
    table.carriers th:nth-child(5), table.carriers td:nth-child(5) { display: none; }
  }
</style>
</head>
<body>

<header class="topbar">
  <h1 onclick="navigate('#/')"><span class="logo-mark"></span>Carrier Management</h1>
  <div class="spacer"></div>
  <button class="btn primary" onclick="openCarrierForm()">+ New Carrier</button>
</header>

<main id="app"><div class="loading">Loading…</div></main>

<div id="modal-root"></div>
<div id="toast-root"></div>

<script>
// =========================================================================
// API helpers
// =========================================================================
const API = '/api';

async function api(method, path, body) {
  const opts = { method, headers: {} };
  if (body !== undefined) {
    opts.headers['Content-Type'] = 'application/json';
    opts.body = JSON.stringify(body);
  }
  const res = await fetch(API + path, opts);
  const text = await res.text();
  const data = text ? JSON.parse(text) : {};
  if (!res.ok) {
    const msg = data.error || (data.errors && data.errors.join(', ')) || `HTTP ${res.status}`;
    throw new Error(msg);
  }
  return data;
}

// =========================================================================
// Utility
// =========================================================================
function el(html) { const t = document.createElement('template'); t.innerHTML = html.trim(); return t.content.firstElementChild; }
function esc(s) {
  if (s === null || s === undefined) return '';
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c]);
}
function fmtDate(s) { if (!s) return '—'; try { return new Date(s.replace(' ', 'T') + 'Z').toLocaleString(); } catch { return s; } }
function fmtDateOnly(s) { if (!s) return '—'; return s.slice(0, 10); }
function fmtMoney(n) { if (n === null || n === undefined || n === '') return '—'; return '$' + Number(n).toFixed(2); }

function toast(msg, kind) {
  const t = el(`<div class="toast ${kind === 'error' ? 'error' : ''}">${esc(msg)}</div>`);
  document.getElementById('toast-root').appendChild(t);
  setTimeout(() => t.remove(), 3000);
}

function confirmAction(msg) { return window.confirm(msg); }

// =========================================================================
// Router (hash-based: #/ list, #/carrier/:id detail)
// =========================================================================
function navigate(hash) {
  if (window.location.hash === hash) route();
  else window.location.hash = hash;
}
window.addEventListener('hashchange', route);
window.addEventListener('DOMContentLoaded', route);

function route() {
  closeModal();
  const hash = window.location.hash || '#/';
  const m = hash.match(/^#\/carrier\/(\d+)$/);
  if (m) return renderDetail(Number(m[1]));
  return renderList();
}

// =========================================================================
// Carrier LIST view
// =========================================================================
const listState = { q: '', status: '', equipment: '' };

async function renderList() {
  const root = document.getElementById('app');
  root.innerHTML = `
    <div class="toolbar">
      <input class="search" id="f-q" type="search" placeholder="Search name, MC#, or contact name..." value="${esc(listState.q)}" />
      <select id="f-status">
        <option value="">All statuses</option>
        <option value="Active">Active</option>
        <option value="Watch">Watch</option>
        <option value="Blocked">Blocked</option>
      </select>
      <select id="f-equipment">
        <option value="">All equipment</option>
        <option value="Enclosed">Enclosed</option>
        <option value="Open">Open</option>
        <option value="Flatbed">Flatbed</option>
        <option value="Hotshot">Hotshot</option>
        <option value="Other">Other</option>
      </select>
    </div>
    <div id="list-body"><div class="loading">Loading…</div></div>
  `;

  const qEl = document.getElementById('f-q');
  const statusEl = document.getElementById('f-status');
  const equipEl = document.getElementById('f-equipment');
  statusEl.value = listState.status;
  equipEl.value = listState.equipment;

  // debounce search input
  let t;
  qEl.addEventListener('input', () => {
    listState.q = qEl.value;
    clearTimeout(t);
    t = setTimeout(loadList, 200);
  });
  statusEl.addEventListener('change', () => { listState.status = statusEl.value; loadList(); });
  equipEl.addEventListener('change', () => { listState.equipment = equipEl.value; loadList(); });

  await loadList();
}

async function loadList() {
  const body = document.getElementById('list-body');
  if (!body) return;
  const params = new URLSearchParams();
  if (listState.q)         params.set('q', listState.q);
  if (listState.status)    params.set('status', listState.status);
  if (listState.equipment) params.set('equipment', listState.equipment);

  try {
    const carriers = await api('GET', '/carriers?' + params.toString());
    if (!carriers.length) {
      body.innerHTML = `<div class="empty-state">No carriers found.<br><br>
        <button class="btn primary" onclick="openCarrierForm()">+ Add your first carrier</button></div>`;
      return;
    }
    body.innerHTML = `
      <div class="row-counts" style="margin-bottom:8px;">${carriers.length} carrier${carriers.length === 1 ? '' : 's'}</div>
      <table class="carriers">
        <thead>
          <tr>
            <th>Name</th>
            <th>MC#</th>
            <th>Equipment</th>
            <th>$/mile</th>
            <th>Status</th>
            <th>Lanes</th>
            <th>Loads</th>
          </tr>
        </thead>
        <tbody>
          ${carriers.map(c => `
            <tr onclick="navigate('#/carrier/${c.id}')">
              <td><strong>${esc(c.name)}</strong></td>
              <td>${esc(c.mc_number || '—')}</td>
              <td>${esc(c.equipment_type || '—')}</td>
              <td>${fmtMoney(c.price_per_mile)}</td>
              <td><span class="badge status-${esc(c.status)}">${esc(c.status)}</span></td>
              <td>${c.lane_count}</td>
              <td>${c.load_count}</td>
            </tr>
          `).join('')}
        </tbody>
      </table>
    `;
  } catch (e) {
    body.innerHTML = `<div class="empty-state" style="color:var(--red)">Failed to load: ${esc(e.message)}</div>`;
  }
}

// =========================================================================
// Carrier DETAIL view
// =========================================================================
async function renderDetail(id) {
  const root = document.getElementById('app');
  root.innerHTML = `<div class="loading">Loading carrier…</div>`;
  let c;
  try {
    c = await api('GET', `/carriers/${id}`);
  } catch (e) {
    root.innerHTML = `<div class="empty-state" style="color:var(--red)">${esc(e.message)}</div>
      <p style="text-align:center"><a onclick="navigate('#/')">← Back to list</a></p>`;
    return;
  }

  root.innerHTML = `
    <span class="back-link" onclick="navigate('#/')">← All carriers</span>
    <div class="detail-header">
      <div>
        <h2>${esc(c.name)} <span class="badge status-${esc(c.status)}">${esc(c.status)}</span></h2>
        <div class="meta">
          ${c.mc_number ? `MC# ${esc(c.mc_number)}` : ''}
          ${c.dot_number ? ` · DOT# ${esc(c.dot_number)}` : ''}
          ${c.equipment_type ? ` · ${esc(c.equipment_type)}` : ''}
          ${c.price_per_mile != null ? ` · ${fmtMoney(c.price_per_mile)}/mi` : ''}
        </div>
      </div>
      <div class="actions">
        <button class="btn" onclick='openCarrierForm(${JSON.stringify(c).replace(/"/g, "&quot;")})'>Edit</button>
        <button class="btn danger" onclick="deleteCarrier(${c.id})">Delete</button>
      </div>
    </div>

    <!-- Carrier info card -->
    <div class="card">
      <div class="card-header"><h3>Carrier Info</h3></div>
      <div class="card-body">
        <div class="kv-grid">
          <div><div class="kv-label">MC Number</div><div class="kv-value">${esc(c.mc_number || '—')}</div></div>
          <div><div class="kv-label">DOT Number</div><div class="kv-value">${esc(c.dot_number || '—')}</div></div>
          <div><div class="kv-label">Equipment</div><div class="kv-value">${esc(c.equipment_type || '—')}</div></div>
          <div><div class="kv-label">Price / Mile</div><div class="kv-value">${fmtMoney(c.price_per_mile)}</div></div>
          <div><div class="kv-label">Status</div><div class="kv-value"><span class="badge status-${esc(c.status)}">${esc(c.status)}</span></div></div>
          <div><div class="kv-label">Insurance Expiry</div><div class="kv-value">${esc(c.insurance_expiry || '—')}</div></div>
          <div><div class="kv-label">Created</div><div class="kv-value">${fmtDate(c.created_at)}</div></div>
          <div><div class="kv-label">Updated</div><div class="kv-value">${fmtDate(c.updated_at)}</div></div>
        </div>
      </div>
    </div>

    <!-- Contacts -->
    <div class="card">
      <div class="card-header">
        <h3>Contacts (${c.contacts.length})</h3>
        <button class="btn sm primary" onclick="openContactForm(${c.id})">+ Add Contact</button>
      </div>
      <div class="card-body">
        ${c.contacts.length === 0 ? '<div class="muted">No contacts yet.</div>' : `
          <div class="item-list">
            ${c.contacts.map(ct => `
              <div class="item">
                <div class="item-main">
                  <div class="title">
                    ${esc(ct.name)}
                    ${ct.role ? `<span class="badge role" style="margin-left:8px">${esc(ct.role)}</span>` : ''}
                  </div>
                  <div class="sub">
                    ${ct.phone ? `📞 ${esc(ct.phone)}` : ''}
                    ${ct.phone && ct.email ? ' · ' : ''}
                    ${ct.email ? `✉️ <a href="mailto:${esc(ct.email)}">${esc(ct.email)}</a>` : ''}
                    ${!ct.phone && !ct.email ? '<span class="muted">no contact info</span>' : ''}
                  </div>
                </div>
                <div class="item-actions">
                  <button class="btn sm" onclick='openContactForm(${c.id}, ${JSON.stringify(ct).replace(/"/g, "&quot;")})'>Edit</button>
                  <button class="btn sm danger" onclick="deleteContact(${ct.id}, ${c.id})">Delete</button>
                </div>
              </div>
            `).join('')}
          </div>
        `}
      </div>
    </div>

    <!-- Lanes -->
    <div class="card">
      <div class="card-header">
        <h3>Lanes (${c.lanes.length})</h3>
        <button class="btn sm primary" onclick="openLaneForm(${c.id})">+ Add Lane</button>
      </div>
      <div class="card-body">
        ${c.lanes.length === 0 ? '<div class="muted">No lanes yet.</div>' : `
          <div class="item-list">
            ${c.lanes.map(l => `
              <div class="item">
                <div class="item-main">
                  <div class="title">${esc(l.origin)} → ${esc(l.destination)}</div>
                </div>
                <div class="item-actions">
                  <button class="btn sm danger" onclick="deleteLane(${l.id}, ${c.id})">Delete</button>
                </div>
              </div>
            `).join('')}
          </div>
        `}
      </div>
    </div>

    <!-- Loads -->
    <div class="card">
      <div class="card-header">
        <h3>Load History (${c.loads.length})</h3>
        <button class="btn sm primary" onclick="openLoadForm(${c.id})">+ Add Load</button>
      </div>
      <div class="card-body" style="padding: 0;">
        ${c.loads.length === 0 ? '<div class="muted" style="padding:16px">No loads recorded yet.</div>' : `
          <table class="loads">
            <thead><tr>
              <th>Load #</th><th>Date</th><th>Route</th><th>Outcome</th><th>Notes</th><th></th>
            </tr></thead>
            <tbody>
              ${c.loads.map(ld => `
                <tr>
                  <td>${esc(ld.load_number || '—')}</td>
                  <td>${esc(fmtDateOnly(ld.date))}</td>
                  <td>${esc(ld.origin || '—')} → ${esc(ld.destination || '—')}</td>
                  <td>${ld.outcome ? `<span class="badge outcome-${esc(ld.outcome)}">${esc(ld.outcome)}</span>` : '—'}</td>
                  <td style="max-width:240px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;" title="${esc(ld.notes || '')}">${esc(ld.notes || '')}</td>
                  <td style="white-space:nowrap; text-align:right;">
                    <button class="btn sm" onclick='openLoadForm(${c.id}, ${JSON.stringify(ld).replace(/"/g, "&quot;")})'>Edit</button>
                    <button class="btn sm danger" onclick="deleteLoad(${ld.id}, ${c.id})">Del</button>
                  </td>
                </tr>
              `).join('')}
            </tbody>
          </table>
        `}
      </div>
    </div>

    <!-- Notes -->
    <div class="card">
      <div class="card-header">
        <h3>Notes (${c.notes.length})</h3>
        <button class="btn sm primary" onclick="openNoteForm(${c.id})">+ Add Note</button>
      </div>
      <div class="card-body">
        ${c.notes.length === 0 ? '<div class="muted">No notes yet.</div>' : c.notes.map(n => `
          <div class="note">
            <button class="btn sm danger ghost note-del" onclick="deleteNote(${n.id}, ${c.id})" title="Delete note">×</button>
            <div class="note-meta">${fmtDate(n.created_at)}</div>
            <div class="note-body">${esc(n.note)}</div>
          </div>
        `).join('')}
      </div>
    </div>
  `;
}

// =========================================================================
// Modal helpers
// =========================================================================
function openModal(title, bodyHtml, onSubmit, submitLabel = 'Save') {
  const backdrop = el(`
    <div class="modal-backdrop">
      <div class="modal">
        <div class="modal-header">
          <h3>${esc(title)}</h3>
          <button class="close" type="button">&times;</button>
        </div>
        <form id="modal-form">
          <div class="modal-body">${bodyHtml}</div>
          <div class="modal-footer">
            <button type="button" class="btn" id="modal-cancel">Cancel</button>
            <button type="submit" class="btn primary">${esc(submitLabel)}</button>
          </div>
        </form>
      </div>
    </div>
  `);
  const root = document.getElementById('modal-root');
  root.innerHTML = '';
  root.appendChild(backdrop);

  backdrop.querySelector('.close').onclick = closeModal;
  backdrop.querySelector('#modal-cancel').onclick = closeModal;
  backdrop.addEventListener('click', (e) => { if (e.target === backdrop) closeModal(); });

  const form = backdrop.querySelector('#modal-form');
  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    const fd = new FormData(form);
    const data = Object.fromEntries(fd.entries());
    try {
      await onSubmit(data);
      closeModal();
    } catch (err) {
      toast(err.message, 'error');
    }
  });

  // Autofocus first input
  const firstInput = backdrop.querySelector('input, select, textarea');
  if (firstInput) firstInput.focus();
}

function closeModal() {
  document.getElementById('modal-root').innerHTML = '';
}

// Close modal on Escape
document.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeModal(); });

// =========================================================================
// Carrier form (add / edit)
// =========================================================================
function openCarrierForm(existing) {
  const e = existing || {};
  const title = existing ? 'Edit Carrier' : 'New Carrier';
  openModal(title, `
    <div class="field"><label>Name *</label><input name="name" required value="${esc(e.name || '')}" /></div>
    <div class="field-row">
      <div class="field"><label>MC Number</label><input name="mc_number" value="${esc(e.mc_number || '')}" /></div>
      <div class="field"><label>DOT Number</label><input name="dot_number" value="${esc(e.dot_number || '')}" /></div>
    </div>
    <div class="field-row">
      <div class="field"><label>Equipment Type</label>
        <select name="equipment_type">
          <option value="">—</option>
          ${['Enclosed','Open','Flatbed','Hotshot','Other'].map(t =>
            `<option value="${t}" ${e.equipment_type === t ? 'selected' : ''}>${t}</option>`).join('')}
        </select>
      </div>
      <div class="field"><label>Price per Mile ($)</label>
        <input name="price_per_mile" type="number" step="0.01" min="0" value="${e.price_per_mile ?? ''}" />
      </div>
    </div>
    <div class="field-row">
      <div class="field"><label>Status</label>
        <select name="status">
          ${['Active','Watch','Blocked'].map(s =>
            `<option value="${s}" ${(e.status || 'Active') === s ? 'selected' : ''}>${s}</option>`).join('')}
        </select>
      </div>
      <div class="field"><label>Insurance Expiry</label>
        <input name="insurance_expiry" type="date" value="${esc(e.insurance_expiry || '')}" />
      </div>
    </div>
  `, async (data) => {
    if (existing) {
      const updated = await api('PUT', `/carriers/${existing.id}`, data);
      toast('Carrier updated');
      renderDetail(updated.id);
    } else {
      const created = await api('POST', '/carriers', data);
      toast('Carrier created');
      navigate(`#/carrier/${created.id}`);
    }
  }, existing ? 'Save' : 'Create');
}

async function deleteCarrier(id) {
  if (!confirmAction('Delete this carrier and all its contacts, lanes, loads and notes? This cannot be undone.')) return;
  try {
    await api('DELETE', `/carriers/${id}`);
    toast('Carrier deleted');
    navigate('#/');
  } catch (e) { toast(e.message, 'error'); }
}
